version: 1

models:
  default:
    provider: openai-compatible
    model: gpt-5.5
    base_url_env: LLM_BASE_URL
    api_key_env: LLM_API_KEY

agents:
  planner:
    role: planner
    model: default
    system: |
      You are the Planner half of a Codex-like coding agent. You talk to the
      user, maintain context, decide when repository work is ready, and produce
      concise public progress summaries. Do not expose private chain-of-thought.
      Summarize what you are checking, why it matters, what you found, and what
      happens next.
    memory:
      read: [user, project, run, repo_facts, knowledge_hints]
      write: [run]
    output_contract: planner_conversation

  executor:
    role: executor
    model: default
    system: |
      You are a coding executor and the Executor half of a Codex-like coding
      agent. You never talk directly to the user. Act through the assigned harness and emit
      evidence-backed action summaries for tools, commands, file changes, and
      verification. Do not claim success without evidence.
    memory:
      read: [workflow, run]
      write: [run]
    output_contract: execution_result

harnesses:
  planner-conversation:
    backend: planner-model
    tools: [memory_read, knowledge_retrieve, repo_search, read_file, git_diff]
    permissions:
      read_files: allow
      write_files: deny
      run_commands: deny
      network: deny
      secrets: deny
      publish_external: deny
      git_commit: deny
      git_push: deny
      deploy: deny
    memory:
      read: [user, project, run, repo_facts, knowledge_hints]
      write: [run]
    verification:
      require_evidence: false

  review-only:
    backend: native-rust
    tools: [repo_search, read_file, git_diff]
    permissions:
      read_files: allow
      write_files: deny
      run_commands: deny
      network: deny
      secrets: deny
      publish_external: deny
      git_commit: deny
      git_push: deny
      deploy: deny
    memory:
      read: [workflow, run]
      write: [run]

  openhands-code-edit:
    backend: openhands
    openhands:
      server_url: "http://127.0.0.1:8000"
      session_api_key_env: SESSION_API_KEY
      workspace_mode: local
      api_paths:
        api_prefix: "/api"
        events_search_path: "/conversations/{conversation_id}/events/search"
        run_endpoint_path: "/conversations/{conversation_id}/run"
        websocket_path_template: "/sockets/events/{conversation_id}"
        auth_header: x_session_api_key
      run_start_strategy: post_run_endpoint
    tools: [terminal, file_editor, task_tracker]
    permissions:
      read_files: allow
      write_files: ask
      run_commands: ask
      network: ask
      secrets: ask
      publish_external: deny
      git_commit: deny
      git_push: deny
      deploy: deny
    memory:
      read: [workflow, run]
      write: [run]
    verification:
      require_evidence: true

workflows:
  planner-led:
    name: Planner-led Agent Workflow
    max_rounds: 3
    nodes:
      - id: planner
        agent: planner
        harness: planner-conversation
      - id: executor
        agent: executor
        harness: openhands-code-edit
    edges:
      - from: planner
        to: executor
        on: ready
      - from: executor
        to: planner
        on: completed
    stop:
      on_status: [completed, blocked, failed]
      final_report_agent: planner
