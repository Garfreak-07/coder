version: 1

models:
  # Provider Settings in the app are the normal user path for provider, model,
  # API key, base URL, and proxy URL. The env fields below are developer or
  # headless fallback only.
  default:
    provider: deepseek
    model: best
    base_url_env: LLM_BASE_URL
    api_key_env: LLM_API_KEY

agents:
  planner:
    role: planner
    model: default
    system: |
      You are Coder Planner, the planning half of a Codex-like coding agent.
      You talk to the user, maintain context, decide when repository work is
      ready, and produce concise public progress summaries. Chat is planning and
      conversation only: you do not edit files or run commands in chat.
      Execution starts only after the user clicks Start Work, which hands the
      task to the OpenHands executor. When ready, say: "I'm ready. Click Start
      Work and I'll execute this through the OpenHands executor." Do not ask the
      user to switch modes. Do not mention Discuss mode or Work mode. Do not
      expose private chain-of-thought. Summarize what you are checking, why it
      matters, what you found, and what happens next.
    memory:
      read: [user, project, run, repo_facts, knowledge_hints]
      write: [run]
    output_contract: planner_conversation

  executor:
    role: executor
    model: default
    system: |
      You are a coding executor and the Executor half of a Codex-like coding
      agent. You never talk directly to the user. Act through the assigned harness and emit
      evidence-backed action summaries for tools, commands, file changes, and
      verification. Do not claim success without evidence.
    memory:
      read: [workflow, run]
      write: [run]
    output_contract: execution_result

harnesses:
  planner-conversation:
    backend: planner-model
    tools: [memory_read, knowledge_retrieve, repo_search, read_file, git_diff]
    permissions:
      read_files: allow
      write_files: deny
      run_commands: deny
      network: deny
      secrets: deny
      publish_external: deny
      git_commit: deny
      git_push: deny
      deploy: deny
    memory:
      read: [user, project, run, repo_facts, knowledge_hints]
      write: [run]
    verification:
      require_evidence: false

  review-only:
    backend: native-rust
    tools: [repo_search, read_file, git_diff]
    permissions:
      read_files: allow
      write_files: deny
      run_commands: deny
      network: deny
      secrets: deny
      publish_external: deny
      git_commit: deny
      git_push: deny
      deploy: deny
    memory:
      read: [workflow, run]
      write: [run]

  openhands-code-edit:
    backend: openhands
    openhands:
      server_url: ""
      session_api_key_env:
      workspace_mode: local
      api_paths: {}
      run_start_strategy: post_user_event_with_run_true
    tools: [terminal, file_editor, task_tracker]
    permissions:
      read_files: allow
      write_files: ask
      run_commands: ask
      network: ask
      secrets: ask
      publish_external: deny
      git_commit: deny
      git_push: deny
      deploy: deny
    memory:
      read: [workflow, run]
      write: [run]
    verification:
      require_evidence: true

workflows:
  planner-led:
    name: Planner-led Agent Workflow
    max_rounds: 3
    nodes:
      - id: planner
        agent: planner
        harness: planner-conversation
      - id: executor
        agent: executor
        harness: openhands-code-edit
    edges:
      - from: planner
        to: executor
        on: ready
      - from: executor
        to: planner
        on: completed
    stop:
      on_status: [completed, blocked, failed]
      final_report_agent: planner
