name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-legacy:
    name: Legacy Python compatibility (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy-python
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[openhands,rag]"
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Compile Python sources
        run: python -m compileall src tests

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm run test
      - name: Build frontend
        run: npm run build

  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  installer-dry-run:
    name: Installer dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: PowerShell installer dry-run
        shell: pwsh
        run: ./scripts/install.ps1 -DryRun
      - name: POSIX installer dry-run
        run: bash ./scripts/install.sh --dry-run
      - name: npm wrapper dry-run
        run: node packaging/npm/bin/coder-rust.js --dry-run
