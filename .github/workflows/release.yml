name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: coder-rust-x86_64-unknown-linux-gnu.tar.gz
            binary: coder-rust
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: coder-rust-x86_64-pc-windows-msvc.zip
            binary: coder-rust.exe
          - os: macos-13
            target: x86_64-apple-darwin
            archive: coder-rust-x86_64-apple-darwin.tar.gz
            binary: coder-rust
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: coder-rust-aarch64-apple-darwin.tar.gz
            binary: coder-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Test CLI crate
        run: cargo test -p coder-cli
      - name: Build release binary
        run: cargo build --release -p coder-cli --target ${{ matrix.target }}
      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/stage
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/stage/
          cp README.md LICENSE dist/stage/
          mkdir -p dist/stage/examples
          cp examples/coder.yaml dist/stage/examples/
          chmod +x "dist/stage/${{ matrix.binary }}"
          tar -C dist/stage -czf "dist/${{ matrix.archive }}" .
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/stage/examples | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/stage/
          Copy-Item README.md, LICENSE dist/stage/
          Copy-Item examples/coder.yaml dist/stage/examples/
          Compress-Archive -Path dist/stage/* -DestinationPath "dist/${{ matrix.archive }}" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error
      - name: Upload GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive }}
